name: CI
on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [published]

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

  check-size:
    runs-on: ubuntu-latest
    needs: hadolint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build amd64 image for size check
        uses: docker/build-push-action@v7
        with:
          load: true
          tags: periodic-docker-prune:ci
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check image size
        run: |
          pip install docker-image-size-limit
          disl periodic-docker-prune:ci 100MB

  image:
    runs-on: ubuntu-latest
    needs: check-size
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name == 'release'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Generate image identifier
        id: name
        uses: ASzc/change-string-case-action@v8
        with:
          string: ${{ github.repository }}

      - name: Build multi-arch image
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name == 'release' }}
          tags: |
            ${{ steps.name.outputs.lowercase }}:${{ github.sha }}
            ${{ github.event_name == 'release' && format('{0}:latest', steps.name.outputs.lowercase) || '' }}
            ${{ github.event_name == 'release' && format('{0}:{1}', steps.name.outputs.lowercase, github.event.release.name) || '' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
